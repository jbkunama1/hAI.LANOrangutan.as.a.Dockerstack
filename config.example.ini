# LAN Orangutan - Produktiv-Config
# Kopiere diese Datei nach: /opt/lan-orangutan/config/config.ini
# und passe die Werte an deine Umgebung an.

[server]
# Port muss > 1024 sein (Container laeuft als non-root)
port = 2910
bind_address = 0.0.0.0
enable_api = true

[scanning]
# Scan-Intervall in Sekunden (300 = 5 Minuten)
scan_interval = 300

# Mindestabstand zwischen manuellen Scans
min_scan_interval = 30

# Port-Scan aktivieren (findet offene Dienste pro Geraet)
enable_port_scan = true

# Standard-Ports + 3000-3099 (Node/Dev) + 8000-8099 (HTTP-Alt)
port_scan_range = 1-1024,3000-3099,8000-8099

# Zu scannendes Subnetz – anpassen!
# Beispiel Fritzbox-Heimnetz: 192.168.178.0/24
# Beispiel allgemein:         192.168.1.0/24
scan_targets = 192.168.XXX.0/24

[storage]
max_devices = 1000

# Offline-Geraete X Tage behalten
retention_days = 30

# Datenpfad (im Container bereits gesetzt, nur bei Bedarf aendern)
# data_dir = /var/lib/lan-orangutan

[tailscale]
# Tailscale-Integration (auskommentiert = deaktiviert)
# enable = true
# auto_detect = true

[ui]
# Theme: light, dark, auto
theme = auto
